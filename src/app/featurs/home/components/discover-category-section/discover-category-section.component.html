<section id="discover" class="categories-section">
    <div class="container">
        <div class="section-label">
            <h2>{{ lang.t('Discover Categories', 'استكشف الفئات') }}</h2>
            <a [routerLink]="['/', lang.currentLang(), 'category']">{{ lang.t('View All Topics →', 'عرض كل المواضيع ←')
                }}</a>
        </div>
        <div class="cats-grid">
            @for (cat of categories(); track cat.id) {
            <div class="cat-card markata-click-target" [routerLink]="['/', lang.currentLang(), 'category', cat.slug]">
                <img [markataImage]="cat.image" loading="lazy" decoding="async"
                    [ngSrc]="cat.image?.url || 'assets/icons/digital-bond.svg'" fill class="img-placeholder"
                    style="background: linear-gradient(135deg, #1a0f1a, #2a1530, #1a0f20)" [alt]="cat?.image?.alt ?? ''"
                    [class]="'ph-'+($index+1)">
                <div class="cat-card-overlay"></div>
                <div class="cat-card-name">{{ cat.name }}</div>
            </div>
            }
        </div>
    </div>
</section>
