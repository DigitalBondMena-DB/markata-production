<div class="contact-form-card">
  @if (isSuccess()) {
  <div class="alert-success">
    {{ lang.t('Your message has been delivered successfully!', 'تم إرسال رسالتك بنجاح!') }}
  </div>
  }
  @if (errorMessage()) {
  <div class="alert-error">
    {{ errorMessage() }}
  </div>
  }

  <form (submit)="onSubmit($event)" class="contact-form-body">
    <!-- Row: Name and Email side by side -->
    <div class="form-row">
      <app-form-input [formField]="contactForm.name" [label]="'CONTACT.NAME' | translate" id="name"
        placeholder="Jane Doe">
        <svg input-icon xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none">
          <path stroke="rgb(50, 56, 54)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M14.25 15.75v-1.5a3 3 0 0 0-3-3h-4.5a3 3 0 0 0-3 3v1.5M12 5.25a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
        </svg>
      </app-form-input>

      <app-form-input [formField]="contactForm.email" [label]="'CONTACT.EMAIL' | translate" id="email" type="email"
        placeholder="jane@example.com">
        <svg input-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20">
          <path fill="rgb(50, 56, 54)"
            d="M125.4 128C91.5 128 64 155.5 64 189.4C64 190.3 64 191.1 64.1 192L64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192L575.9 192C575.9 191.1 576 190.3 576 189.4C576 155.5 548.5 128 514.6 128L125.4 128zM528 256.3L528 448C528 456.8 520.8 464 512 464L128 464C119.2 464 112 456.8 112 448L112 256.3L266.8 373.7C298.2 397.6 341.7 397.6 373.2 373.7L528 256.3zM112 189.4C112 182 118 176 125.4 176L514.6 176C522 176 528 182 528 189.4C528 193.6 526 197.6 522.7 200.1L344.2 335.5C329.9 346.3 310.1 346.3 295.8 335.5L117.3 200.1C114 197.6 112 193.6 112 189.4z" />
        </svg>
      </app-form-input>
    </div>

    <!-- Subject Field -->
    <app-form-input [formField]="contactForm.subject" [label]="'CONTACT.SUBJECT' | translate" id="subject"
      placeholder="Manuscript submission, support, query...">
      <svg input-icon width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
        <path fill="rgb(50, 56, 54)"
          d="M96 128C96 110.3 110.3 96 128 96L224 96C241.7 96 256 110.3 256 128C256 145.7 241.7 160 224 160L208 160L208 272L432 272L432 160L416 160C398.3 160 384 145.7 384 128C384 110.3 398.3 96 416 96L512 96C529.7 96 544 110.3 544 128C544 145.7 529.7 160 512 160L496 160L496 480L512 480C529.7 480 544 494.3 544 512C544 529.7 529.7 544 512 544L416 544C398.3 544 384 529.7 384 512C384 494.3 398.3 480 416 480L432 480L432 336L208 336L208 480L224 480C241.7 480 256 494.3 256 512C256 529.7 241.7 544 224 544L128 544C110.3 544 96 529.7 96 512C96 494.3 110.3 480 128 480L144 480L144 160L128 160C110.3 160 96 145.7 96 128z" />
      </svg>
    </app-form-input>

    <!-- Message Textarea -->
    <div class="form-group">
      <label for="message" class="form-label">{{ 'CONTACT.MESSAGE' | translate }}</label>
      <div class="input-wrapper">
        <textarea id="message" class="form-input form-textarea" [formField]="contactForm.message"
          [class.input-error]="contactForm.message().touched() && contactForm.message().invalid()"
          placeholder="{{ 'CONTACT.MESSAGE' | translate }}..."></textarea>
      </div>
      @if (contactForm.message().touched() && contactForm.message().invalid()) {
      <ul class="error-list">
        <li>{{ contactForm.message().errors()[0].message | translate }}</li>
      </ul>
      }
    </div>

    <!-- Submit Button -->
    <button type="submit" class="submit-btn" [disabled]="contactForm().invalid() || isSubmitting()">
      @if (isSubmitting()) {
      <span class="loading-spinner"></span>
      } @else {
      <div class="btn-content">
        <svg class="send-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
        </svg>
        {{ 'CONTACT.DELIVER_MESSAGE' | translate }}
      </div>
      }
    </button>
  </form>
</div>
