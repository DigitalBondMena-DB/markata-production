<div class="modal-backdrop" animate.enter="enter-backdrop-animation" (click)="closeModal()">
  <div class="modal-card" animation.enter="enter-card-animation" (click)="$event.stopPropagation()">

    <!-- Close Button -->
    <button type="button" class="close-btn" (click)="closeModal()" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20">
        <path fill="rgb(50, 56, 54)"
          d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z" />
      </svg>
    </button>

    <!-- Header Details -->
    <div class="modal-header">
      <span class="badge">{{ 'AUTH.SIGN_UP' | translate }}</span>
      <h2 class="title">{{ 'AUTH.SIGN_UP' | translate }}</h2>
      <p class="subtitle">{{ 'AUTH.CREATE_ACCOUNT' | translate }}</p>
    </div>

    <!-- Form wrapper -->
    <form (submit)="onSubmit($event)" class="register-form">

      <!-- Name Field -->
      <app-form-input [formField]="registerForm.name" [label]="'AUTH.NAME' | translate" id="name"
        [placeholder]="'AUTH.ENTER_NAME' | translate">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20">
          <path fill="rgb(50, 56, 54)"
            d="M240 192c0-44.2 35.8-80 80-80s80 35.8 80 80-35.8 80-80 80-80-35.8-80-80m208 0c0-70.7-57.3-128-128-128s-128 57.3-128 128 57.3 128 128 128 128-57.3 128-128M144 544c0-70.7 57.3-128 128-128h96c70.7 0 128 57.3 128 128v8c0 13.3 10.7 24 24 24s24-10.7 24-24v-8c0-97.2-78.8-176-176-176h-96c-97.2 0-176 78.8-176 176v8c0 13.3 10.7 24 24 24s24-10.7 24-24z" />
        </svg>
      </app-form-input>

      <!-- Email Field -->
      <app-form-input [formField]="registerForm.email" [label]="'AUTH.EMAIL' | translate" id="email" type="email"
        [placeholder]="'AUTH.ENTER_MAIL' | translate">
        <svg input-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20">
          <path fill="rgb(50, 56, 54)"
            d="M125.4 128C91.5 128 64 155.5 64 189.4C64 190.3 64 191.1 64.1 192L64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192L575.9 192C575.9 191.1 576 190.3 576 189.4C576 155.5 548.5 128 514.6 128L125.4 128zM528 256.3L528 448C528 456.8 520.8 464 512 464L128 464C119.2 464 112 456.8 112 448L112 256.3L266.8 373.7C298.2 397.6 341.7 397.6 373.2 373.7L528 256.3zM112 189.4C112 182 118 176 125.4 176L514.6 176C522 176 528 182 528 189.4C528 193.6 526 197.6 522.7 200.1L344.2 335.5C329.9 346.3 310.1 346.3 295.8 335.5L117.3 200.1C114 197.6 112 193.6 112 189.4z" />
        </svg>
      </app-form-input>

      <!-- Password Field -->
      <app-form-input [formField]="registerForm.password" [label]="'AUTH.PASSWORD' | translate" id="password"
        type="password" [placeholder]="'AUTH.ENTER_PASSWORD' | translate" [showPasswordToggle]="true">
        <svg input-icon width="20" height="20" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M4.16732 7.49998V4.99998C4.16732 3.89491 4.6063 2.8351 5.38771 2.0537C6.16911 1.2723 7.22892 0.833313 8.33398 0.833313C9.43905 0.833313 10.4989 1.2723 11.2803 2.0537C12.0617 2.8351 12.5007 3.89491 12.5007 4.99998V7.49998M9.16732 12.5C9.16732 12.9602 8.79422 13.3333 8.33398 13.3333C7.87375 13.3333 7.50065 12.9602 7.50065 12.5C7.50065 12.0397 7.87375 11.6666 8.33398 11.6666C8.79422 11.6666 9.16732 12.0397 9.16732 12.5ZM2.50065 7.49998H14.1673C15.0878 7.49998 15.834 8.24617 15.834 9.16665V15.8333C15.834 16.7538 15.0878 17.5 14.1673 17.5H2.50065C1.58018 17.5 0.833984 16.7538 0.833984 15.8333V9.16665C0.833984 8.24617 1.58018 7.49998 2.50065 7.49998Z"
            stroke="rgb(50, 56, 54)" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </app-form-input>

      <!-- Confirm Password Field -->
      <app-form-input [formField]="registerForm.confirmPassword" [label]="'AUTH.CONFIRM_PASSWORD' | translate"
        id="confirmPassword" type="password" [placeholder]="'AUTH.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
        [showPasswordToggle]="true">
        <svg input-icon width="20" height="20" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M4.16732 7.49998V4.99998C4.16732 3.89491 4.6063 2.8351 5.38771 2.0537C6.16911 1.2723 7.22892 0.833313 8.33398 0.833313C9.43905 0.833313 10.4989 1.2723 11.2803 2.0537C12.0617 2.8351 12.5007 3.89491 12.5007 4.99998V7.49998M9.16732 12.5C9.16732 12.9602 8.79422 13.3333 8.33398 13.3333C7.87375 13.3333 7.50065 12.9602 7.50065 12.5C7.50065 12.0397 7.87375 11.6666 8.33398 11.6666C8.79422 11.6666 9.16732 12.0397 9.16732 12.5ZM2.50065 7.49998H14.1673C15.0878 7.49998 15.834 8.24617 15.834 9.16665V15.8333C15.834 16.7538 15.0878 17.5 14.1673 17.5H2.50065C1.58018 17.5 0.833984 16.7538 0.833984 15.8333V9.16665C0.833984 8.24617 1.58018 7.49998 2.50065 7.49998Z"
            stroke="rgb(50, 56, 54)" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </app-form-input>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn" [disabled]="registerForm().invalid()">
        {{ 'AUTH.CONTINUE' | translate }}
      </button>

    </form>

    <!-- Already Have Account Link -->
    <div class="footer-options">
      <a href="javascript:void(0)" (click)="closeModal()" class="signin-link">
        {{ 'AUTH.ALREADY_HAVE_ACCOUNT' | translate }}
      </a>
    </div>

  </div>
</div>
