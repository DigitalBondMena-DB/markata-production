@if (showSuccess()) {
<app-success-alert [title]="'AUTH.SUCCESS' | translate" [message]="'AUTH.RESET_PASSWORD_SUCCESS' | translate"
  (confirm)="closeModal()">
</app-success-alert>
} @else {
<app-auth-modal [badge]="'AUTH.RESET_PASSWORD_TITLE' | translate" [subtitle]="'AUTH.RESET_PASSWORD_DESC' | translate"
  [footerText]="'AUTH.BACK_TO_SIGNIN' | translate" (close)="closeModal()" (footerClick)="closeModal()">

  <!-- Form wrapper -->
  <form (submit)="onSubmit($event)" class="auth-form">

    @if (errorMessage()) {
    <div class="alert-error">
      {{ errorMessage() }}
    </div>
    }

    <!-- Password Field -->
    <app-form-input [formField]="resetPasswordForm.password" [label]="'AUTH.PASSWORD' | translate" id="password"
      type="password" [placeholder]="'AUTH.ENTER_PASSWORD' | translate" [showPasswordToggle]="true">
      <svg input-icon width="20" height="20" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M4.16732 7.49998V4.99998C4.16732 3.89491 4.6063 2.8351 5.38771 2.0537C6.16911 1.2723 7.22892 0.833313 8.33398 0.833313C9.43905 0.833313 10.4989 1.2723 11.2803 2.0537C12.0617 2.8351 12.5007 3.89491 12.5007 4.99998V7.49998M9.16732 12.5C9.16732 12.9602 8.79422 13.3333 8.33398 13.3333C7.87375 13.3333 7.50065 12.9602 7.50065 12.5C7.50065 12.0397 7.87375 11.6666 8.33398 11.6666C8.79422 11.6666 9.16732 12.0397 9.16732 12.5ZM2.50065 7.49998H14.1673C15.0878 7.49998 15.834 8.24617 15.834 9.16665V15.8333C15.834 16.7538 15.0878 17.5 14.1673 17.5H2.50065C1.58018 17.5 0.833984 16.7538 0.833984 15.8333V9.16665C0.833984 8.24617 1.58018 7.49998 2.50065 7.49998Z"
          stroke="rgb(50, 56, 54)" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </app-form-input>
    @if (formErrors()?.['password']) {
    <div class="field-error-message">{{ formErrors()?.['password']?.[0] }}</div>
    }

    <!-- Confirm Password Field -->
    <app-form-input [formField]="resetPasswordForm.confirmPassword" [label]="'AUTH.CONFIRM_PASSWORD' | translate"
      id="confirmPassword" type="password" [placeholder]="'AUTH.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
      [showPasswordToggle]="true">
      <svg input-icon width="20" height="20" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M4.16732 7.49998V4.99998C4.16732 3.89491 4.6063 2.8351 5.38771 2.0537C6.16911 1.2723 7.22892 0.833313 8.33398 0.833313C9.43905 0.833313 10.4989 1.2723 11.2803 2.0537C12.0617 2.8351 12.5007 3.89491 12.5007 4.99998V7.49998M9.16732 12.5C9.16732 12.9602 8.79422 13.3333 8.33398 13.3333C7.87375 13.3333 7.50065 12.9602 7.50065 12.5C7.50065 12.0397 7.87375 11.6666 8.33398 11.6666C8.79422 11.6666 9.16732 12.0397 9.16732 12.5ZM2.50065 7.49998H14.1673C15.0878 7.49998 15.834 8.24617 15.834 9.16665V15.8333C15.834 16.7538 15.0878 17.5 14.1673 17.5H2.50065C1.58018 17.5 0.833984 16.7538 0.833984 15.8333V9.16665C0.833984 8.24617 1.58018 7.49998 2.50065 7.49998Z"
          stroke="rgb(50, 56, 54)" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </app-form-input>
    @if (formErrors()?.['password_confirmation']) {
    <div class="field-error-message">{{ formErrors()?.['password_confirmation']?.[0] }}</div>
    }

    <!-- Submit Button -->
    <button type="submit" class="submit-btn" [disabled]="resetPasswordForm().invalid() || authService.loading()">
      @if (authService.loading()) {
      <span class="loading-spinner"></span>
      } @else {
      {{ 'AUTH.RESET_PASSWORD_SUBMIT' | translate }}
      }
    </button>

  </form>

</app-auth-modal>
}
