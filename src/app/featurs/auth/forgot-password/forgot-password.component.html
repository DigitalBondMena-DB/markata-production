@if (showSuccess()) {
<app-success-alert [title]="'AUTH.SUCCESS' | translate" [message]="'AUTH.FORGOT_PASSWORD_SUCCESS' | translate"
  (confirm)="closeModal()">
</app-success-alert>
} @else {
<app-auth-modal [badge]="'AUTH.FORGOT_PASSWORD_TITLE' | translate"
  [modalTitle]="'AUTH.FORGOT_PASSWORD_TITLE' | translate" [subtitle]="'AUTH.FORGOT_PASSWORD_DESC' | translate"
  [footerText]="'AUTH.SIGN_IN' | translate" (close)="closeModal()" (footerClick)="closeModal()">

  <!-- Form wrapper -->
  <form (submit)="onSubmit($event)" class="auth-form">

    @if (errorMessage()) {
    <div class="alert-error">
      {{ errorMessage() }}
    </div>
    }

    <!-- Email Field -->
    <app-form-input [formField]="forgotPasswordForm.email" [label]="'AUTH.EMAIL' | translate" id="email" type="email"
      [placeholder]="'AUTH.ENTER_MAIL' | translate">
      <svg input-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20">
        <path fill="rgb(50, 56, 54)"
          d="M125.4 128C91.5 128 64 155.5 64 189.4C64 190.3 64 191.1 64.1 192L64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192L575.9 192C575.9 191.1 576 190.3 576 189.4C576 155.5 548.5 128 514.6 128L125.4 128zM528 256.3L528 448C528 456.8 520.8 464 512 464L128 464C119.2 464 112 456.8 112 448L112 256.3L266.8 373.7C298.2 397.6 341.7 397.6 373.2 373.7L528 256.3zM112 189.4C112 182 118 176 125.4 176L514.6 176C522 176 528 182 528 189.4C528 193.6 526 197.6 522.7 200.1L344.2 335.5C329.9 346.3 310.1 346.3 295.8 335.5L117.3 200.1C114 197.6 112 193.6 112 189.4z" />
      </svg>
    </app-form-input>
    @if (formErrors()?.['email']) {
      <div class="field-error-message">{{ formErrors()?.['email']?.[0] }}</div>
    }

    <!-- Submit Button -->
    <button type="submit" class="submit-btn" [disabled]="forgotPasswordForm().invalid() || authService.loading()">
      @if (authService.loading()) {
      <span class="loading-spinner"></span>
      } @else {
      {{ 'AUTH.CONTINUE' | translate }}
      }
    </button>

  </form>

</app-auth-modal>
}
