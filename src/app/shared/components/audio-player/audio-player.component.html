<div class="audio-player-card" (keydown)="handleKeyDown($event)" tabindex="0">
  <div class="player-left-section">
    <!-- Play/Pause Button -->
    <button type="button" class="play-btn" (click)="togglePlay()"
      [attr.aria-label]="playing() ? 'Pause audio' : 'Play audio'" [class.btn-loading]="loading()">
      @if (loading()) {
      <span class="audio-spinner" aria-hidden="true"></span>
      } @else if (playing()) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
      } @else {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
      }
    </button>
    <div class="audio-info">
      <span class="audio-label">{{ title() || ('BLOG_DETAILS.LISTEN_TO_ARTICLE' | translate) }}</span>
    </div>
  </div>

  <div class="player-middle-section">
    <!-- Title / Helper -->


    <!-- Timeline Slider -->
    <div class="timeline-container">
      <span class="time-label current-time" aria-live="off">{{ formattedCurrentTime() }}</span>
      <div class="timeline-slider-wrapper">
        <input type="range" class="timeline-slider" min="0" [max]="duration() || 100" [value]="currentTime()"
          (input)="seek($event)" [attr.aria-label]="'Audio progress'" [attr.aria-valuenow]="currentTime()"
          [attr.aria-valuemin]="0" [attr.aria-valuemax]="duration() || 100"
          [attr.aria-valuetext]="formattedCurrentTime() + ' of ' + formattedDuration()"
          [disabled]="loading() || !duration()" />
        <div class="slider-progress-fill" [style.width.%]="progressPercent()"></div>
      </div>
      <span class="time-label total-duration">{{ formattedDuration() }}</span>
    </div>
  </div>

  <div class="player-right-section">
    <!-- Speed Selector -->
    <button type="button" class="speed-btn" (click)="cycleSpeed()"
      [attr.aria-label]="'Change speed, current: ' + speed() + 'x'" title="Playback Speed">
      {{ speed() }}x
    </button>

    <!-- Mute/Volume Area -->
    <div class="volume-container">
      <button type="button" class="volume-btn" (click)="toggleMute()"
        [attr.aria-label]="muted() || volume() === 0 ? 'Unmute audio' : 'Mute audio'" [attr.aria-pressed]="muted()">
        @if (muted() || volume() === 0) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
        </svg>
        } @else if (volume() < 0.5) { <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"
          fill="currentColor">
          <path d="M7 9v6h4l5 5V4l-5 5H7zm11.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
          </svg>
          } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
          }
      </button>

      <div class="volume-slider-wrapper">
        <input type="range" class="volume-slider" min="0" max="1" step="0.05" [value]="muted() ? 0 : volume()"
          (input)="setVolume($event)" [attr.aria-label]="'Volume slider'"
          [attr.aria-valuenow]="muted() ? 0 : (volume() * 100)" [attr.aria-valuemin]="0" [attr.aria-valuemax]="100"
          [attr.aria-valuetext]="volumePercentText()" />
        <div class="volume-progress-fill" [style.width.%]="(muted() ? 0 : volume()) * 100"></div>
      </div>
    </div>
  </div>
</div>
