<div class="form-group">
  @if (label()) {
    <label [for]="id()" class="form-label">{{ label() }}</label>
  }
  <div class="input-wrapper">
    <span class="input-icon">
      <ng-content select="[input-icon]"></ng-content>
    </span>

    <input
      [type]="inputType()"
      [id]="id()"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="form-input"
      [class.input-error]="touched() && invalid()"
    />

    @if (type() === 'password' && showPasswordToggle()) {
      <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
        @if (!showPassword()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 640 640">
            <path fill="rgb(50, 56, 54)"
              d="M320 144c-65.2 0-118.8 29.6-159.9 67.7C121.6 247.5 95 290 81.4 320c13.6 30 40.2 72.5 78.7 108.3C201.2 466.4 254.8 496 320 496s118.8-29.6 159.9-67.7C518.4 392.5 545 350 558.6 320c-13.6-30-40.2-72.5-78.7-108.3C438.8 173.6 385.2 144 320 144m-192.6 32.6C174.5 132.8 239.2 96 320 96s145.5 36.8 192.6 80.6c46.8 43.5 78.1 95.4 93 131.1 3.3 7.9 3.3 16.7 0 24.6-14.9 35.7-46.2 87.7-93 131.1C465.5 507.1 400.8 544 320 544s-145.5-36.8-192.6-80.6c-46.8-43.5-78.1-95.4-93-131.1-3.3-7.9-3.3-16.7 0-24.6 14.9-35.7 46.2-87.7 93-131.1M320 400c44.2 0 80-35.8 80-80 0-29.6-16.1-55.5-40-69.3-1.4 59.7-49.6 107.9-109.3 109.3 13.8 23.9 39.7 40 69.3 40m-79.6-88.4c2.5.3 5 .4 7.6.4 35.3 0 64-28.7 64-64 0-2.6-.2-5.1-.4-7.6-37.4 3.9-67.2 33.7-71.1 71.1zm45.6-115c10.8-3 22.2-4.5 33.9-4.5 8.8 0 17.5.9 25.8 2.6.3.1.5.1.8.2 57.9 12.2 101.4 63.7 101.4 125.2 0 70.7-57.3 128-128 128-61.6 0-113-43.5-125.2-101.4-1.8-8.6-2.8-17.5-2.8-26.6 0-11 1.4-21.8 4-32 .2-.7.3-1.3.5-1.9 11.9-43.4 46.1-77.6 89.5-89.5z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 640 640">
            <path fill="rgb(50, 56, 54)"
              d="M73 39.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6-.1 34l528 528c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-96.4-96.4c2.7-2.4 5.4-4.8 8-7.2 46.8-43.5 78.1-95.4 93-131.1 3.3-7.9 3.3-16.7 0-24.6-14.9-35.7-46.2-87.7-93-131.1-47.1-43.7-111.8-80.6-192.6-80.6-56.8 0-105.6 18.2-146 44.2zm135.9 136C241 156.2 278.1 144 320 144c65.2 0 118.8 29.6 159.9 67.7C518.4 247.4 545 290 558.5 320c-13.6 30-40.2 72.5-78.6 108.3-3.1 2.8-6.2 5.6-9.4 8.4L425.8 392c14-20.5 22.2-45.3 22.2-72 0-70.7-57.3-128-128-128-26.7 0-51.5 8.2-72 22.2zm182 182-108-108c11.1-5.8 23.7-9.1 37.1-9.1 44.2 0 80 35.8 80 80 0 13.4-3.3 26-9.1 37.1M135.4 237.2l-34-34C68.8 240 46.4 279 34.5 307.7c-3.3 7.9-3.3 16.7 0 24.6 14.9 35.7 46.2 87.7 93 131.1 47.1 43.7 111.8 80.6 192.6 80.6 37.3 0 71.2-7.9 101.5-20.6L384.2 486c-20 6.4-41.4 10-64.2 10-65.2 0-118.8-29.6-159.9-67.7C121.6 392.6 95 350 81.5 320c10.4-23.1 28.6-53.6 54-82.8z" />
          </svg>
        }
      </button>
    }
  </div>
  @if (touched() && invalid()) {
    <ul class="error-list">
      @for (error of errors(); track error) {
        <li>{{ error.message }}</li>
      }
    </ul>
  }
</div>
