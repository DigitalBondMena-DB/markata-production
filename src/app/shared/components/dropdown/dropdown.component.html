@if (customTrigger()) {
  <div (click)="toggle($event)" style="display: contents;">
    <ng-content select="[dropdownTrigger]"></ng-content>
  </div>
} @else {
  <button type="button" class="dropdown-trigger" [attr.aria-expanded]="isOpen()" aria-haspopup="true"
    (click)="toggle($event)">
    <span class="trigger-label">{{ label() }}</span>
    <svg class="chevron-icon" [class.open]="isOpen()" viewBox="0 0 24 24" width="12" height="12">
      <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
    </svg>
  </button>
}

@if (isOpen()) {
<div class="dropdown-overlay" (click)="close()"></div>

<div class="dropdown-menu" role="menu" [attr.aria-label]="label()">
  <div class="mobile-header">
    <h3>{{ label() }}</h3>
    <button type="button" class="close-btn" (click)="close()" aria-label="Close menu">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path fill="currentColor"
          d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
      </svg>
    </button>
  </div>

  <div class="dropdown-content">
    <ng-content></ng-content>
  </div>
</div>
}
