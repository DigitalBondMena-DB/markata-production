<section [id]="data().slug" class="case-studies">
  <div class="container">
    <div class="section-label">
      <h2>{{ data().name }}</h2>
      <a [routerLink]="['/', lang.currentLang(), 'category', data().slug]">{{ lang.t('Explore All →', 'استكشاف الكل ←')
        }}</a>
    </div>
    @if (data().articles.length > 0) {
    <div class="cs-grid">
      @for (art of data().articles; track art.id; let i = $index) {
      <div [class]="'cs-card cs-card-' + ((i % 8) + 1) + ' markata-click-target'"
        [routerLink]="['/', lang.currentLang(), 'article', art.slug]">
        <div markataImg class="img-placeholder" [seed]="art?.image?.url ?? ''"
          style="position: absolute; inset: 0; background: #1a1200"></div>

        <div class="cs-card-overlay"></div>
        <div class="cs-card-content">
          @if (art.topic) {
          <span class="cat-pill">{{ art.topic.name }}</span>
          }
          <h3>{{ art.title }}</h3>
        </div>
      </div>
      }
    </div>
    }
  </div>
</section>
